<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoatJS — Node.js + TypeScript + EDA Learning Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    #content h1 { font-size: 1.8rem; font-weight: 800; margin: 1.5rem 0 0.75rem; color: oklch(var(--p)); }
    #content h2 { font-size: 1.4rem; font-weight: 700; margin: 1.25rem 0 0.5rem; color: oklch(var(--s)); border-bottom: 1px solid oklch(var(--b3)); padding-bottom: 0.3rem; }
    #content h3 { font-size: 1.15rem; font-weight: 600; margin: 1rem 0 0.4rem; color: oklch(var(--a)); }
    #content h4 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.3rem; }
    #content p { margin: 0.5rem 0; line-height: 1.7; }
    #content ul, #content ol { margin: 0.5rem 0 0.5rem 1.5rem; }
    #content li { margin: 0.25rem 0; line-height: 1.6; }
    #content a { color: oklch(var(--p)); text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }
    #content a:hover { color: oklch(var(--pf)); }
    #content code { background: oklch(var(--b3)); padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.85em; }
    #content pre { background: oklch(var(--b3)); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
    #content pre code { background: none; padding: 0; }
    #content blockquote { border-left: 3px solid oklch(var(--p)); padding-left: 1rem; margin: 0.75rem 0; opacity: 0.85; }
    #content hr { border-color: oklch(var(--b3)); margin: 1.5rem 0; }
    #content img { max-width: 100%; border-radius: 0.5rem; }
    #content .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 1rem 0;
      border-radius: 0.5rem;
      border: 1px solid oklch(var(--b3));
    }
    #content table { width: 100%; border-collapse: collapse; font-size: 0.8rem; line-height: 1.4; }
    #content thead { background: oklch(var(--b3)); position: sticky; top: 0; }
    #content th {
      padding: 0.6rem 0.75rem; text-align: left; font-weight: 700; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.03em; color: oklch(var(--p));
      border-bottom: 2px solid oklch(var(--p) / 0.3); white-space: nowrap;
    }
    #content td { padding: 0.5rem 0.75rem; border-bottom: 1px solid oklch(var(--b3) / 0.5); vertical-align: top; }
    #content tbody tr:nth-child(even) { background: oklch(var(--b3) / 0.25); }
    #content tbody tr:hover { background: oklch(var(--p) / 0.07); }
    #content td:last-child { min-width: 150px; }
    #content td a { word-break: break-word; }
    .nav-item.active { background: oklch(var(--p) / 0.15); border-left: 3px solid oklch(var(--p)); font-weight: 600; }
    html { scroll-behavior: smooth; }
    .loader { display: inline-block; width: 1.5rem; height: 1.5rem; border: 3px solid oklch(var(--b3)); border-top-color: oklch(var(--p)); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #back-to-top { transition: opacity 0.3s; }
    @media (max-width: 768px) {
      #content .table-wrap::after {
        content: "90 scroll 92";
        display: block; text-align: center; font-size: 0.7rem; opacity: 0.4; padding: 0.25rem;
      }
      #content table { font-size: 0.75rem; }
      #content td, #content th { padding: 0.4rem 0.5rem; }
    }
  </style>
</head>
<body class="min-h-screen bg-base-200">
  <div class="drawer lg:drawer-open">
    <input id="drawer-toggle" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex flex-col">
      <nav class="navbar bg-base-100 shadow-md sticky top-0 z-30">
        <div class="flex-none lg:hidden">
          <label for="drawer-toggle" class="btn btn-square btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </label>
        </div>
        <div class="flex-1">
          <span class="text-lg font-bold px-2">🐐 GoatJS</span>
          <span class="text-xs opacity-60 hidden sm:inline">Node.js + TypeScript + EDA</span>
        </div>
        <div class="flex-none">
          <button class="btn btn-ghost btn-sm" onclick="toggleTheme()" title="Toggle theme">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </button>
        </div>
      </nav>
      <main class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">
        <div id="content">
          <div class="flex flex-col items-center justify-center min-h-[50vh] gap-4">
            <div class="loader"></div>
            <p class="opacity-60">Loading content...</p>
          </div>
        </div>
      </main>
      <footer class="footer footer-center p-4 bg-base-100 text-base-content text-sm opacity-60">
        <p>1,773+ curated resources &bull; 90-day learning path &bull; 2h/day</p>
      </footer>
    </div>
    <div class="drawer-side z-40">
      <label for="drawer-toggle" aria-label="close sidebar" class="drawer-overlay"></label>
      <aside class="bg-base-100 w-72 min-h-full flex flex-col">
        <div class="p-4 border-b border-base-300">
          <h2 class="text-lg font-bold">🐐 GoatJS Guide</h2>
          <p class="text-xs opacity-60 mt-1">90 days &bull; 180 hours &bull; 1,773+ URLs</p>
        </div>
        <ul class="menu p-2 flex-1 overflow-y-auto" id="nav-menu"></ul>
        <div class="p-3 border-t border-base-300 text-xs opacity-50 text-center">
          <a href="https://github.com/dmnkhorvath/goatjs" target="_blank" class="link">View on GitHub</a>
        </div>
      </aside>
    </div>
  </div>
  <button id="back-to-top" onclick="window.scrollTo({top:0})" class="btn btn-circle btn-primary btn-sm fixed bottom-6 right-6 opacity-0 pointer-events-none shadow-lg z-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
    </svg>
  </button>
  <script>
    var sections = [
      { id: "master",       file: "docs/00_master_guide.md",       icon: "📋", title: "90-Day Master Guide" },
      { id: "fundamentals", file: "docs/01_fundamentals.md",       icon: "📗", title: "Node.js & TS Fundamentals" },
      { id: "eda",          file: "docs/02_eda.md",                icon: "⚡",       title: "Event-Driven Architecture" },
      { id: "nestjs",       file: "docs/03a_nestjs_api_auth.md",   icon: "🏰", title: "NestJS, API & Auth" },
      { id: "orms",         file: "docs/03b_orms_patterns.md",     icon: "🗄️", title: "ORMs & Design Patterns" },
      { id: "testing",      file: "docs/03c_testing_security.md",  icon: "🧪", title: "Testing & Security" },
      { id: "logging",      file: "docs/03d_logging_monitoring.md", icon: "📊", title: "Logging & Monitoring" },
      { id: "devops",       file: "docs/03e_devops_performance.md", icon: "🚀", title: "DevOps & Performance" },
      { id: "youtube",      file: "docs/04_youtube.md",            icon: "🎬", title: "YouTube Resources" }
    ];
    var currentSection = "master";
    var cache = {};
    var navMenu = document.getElementById("nav-menu");
    sections.forEach(function(s) {
      var li = document.createElement("li");
      var a = document.createElement("a");
      a.className = "nav-item";
      a.dataset.id = s.id;
      a.innerHTML = "<span>" + s.icon + "</span><span>" + s.title + "</span>";
      a.addEventListener("click", function() { loadSection(s.id); });
      li.appendChild(a);
      navMenu.appendChild(li);
    });

    function wrapTables(html) {
      return html.replace(/<table/g, '<div class="table-wrap"><table').replace(/<\/table>/g, "</table></div>");
    }

    var renderer = new marked.Renderer();
    renderer.heading = function(data) {
      var raw, level;
      if (typeof data === "object") {
        raw = data.text || "";
        level = data.depth || 1;
      } else {
        raw = String(data);
        level = arguments[1] || 1;
      }
      var slug = raw.replace(/<[^>]*>/g, "").toLowerCase().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-").replace(/-+$/g, "");
      return "<h" + level + ' id="' + slug + '"><a href="#' + slug + '" class="anchor" style="text-decoration:none;opacity:0.3;margin-right:0.3rem;">#</a>' + raw + "</h" + level + ">";
    };
    marked.setOptions({ renderer: renderer });

    async function loadSection(id) {
      currentSection = id;
      document.querySelectorAll(".nav-item").forEach(function(el) {
        el.classList.toggle("active", el.dataset.id === id);
      });
      document.getElementById("drawer-toggle").checked = false;
      var content = document.getElementById("content");
      var section = sections.find(function(s) { return s.id === id; });
      if (cache[id]) {
        content.innerHTML = cache[id];
        window.scrollTo({ top: 0 });
        handleHash();
        return;
      }
      content.innerHTML = '<div class="flex flex-col items-center justify-center min-h-[30vh] gap-4"><div class="loader"></div><p class="opacity-60">Loading ' + section.title + '...</p></div>';
      try {
        var res = await fetch(section.file);
        if (!res.ok) throw new Error("HTTP " + res.status);
        var md = await res.text();
        var html = wrapTables(marked.parse(md));
        cache[id] = html;
        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = '<div class="alert alert-error"><span>Failed to load ' + section.title + ': ' + err.message + '</span></div>';
      }
      window.scrollTo({ top: 0 });
      handleHash();
    }

    function handleHash() {
      if (window.location.hash) {
        var el = document.getElementById(window.location.hash.slice(1));
        if (el) setTimeout(function() { el.scrollIntoView({ behavior: "smooth" }); }, 100);
      }
    }

    document.getElementById("content").addEventListener("click", function(e) {
      var a = e.target.closest('a[href^="#"]');
      if (a) {
        e.preventDefault();
        var targetId = a.getAttribute("href").slice(1);
        var el = document.getElementById(targetId);
        if (el) {
          history.pushState(null, "", "#" + targetId);
          el.scrollIntoView({ behavior: "smooth" });
        }
      }
    });

    var darkMode = true;
    function toggleTheme() {
      darkMode = !darkMode;
      document.documentElement.setAttribute("data-theme", darkMode ? "night" : "emerald");
    }

    window.addEventListener("scroll", function() {
      var btn = document.getElementById("back-to-top");
      if (window.scrollY > 400) {
        btn.classList.remove("opacity-0", "pointer-events-none");
        btn.classList.add("opacity-100");
      } else {
        btn.classList.add("opacity-0", "pointer-events-none");
        btn.classList.remove("opacity-100");
      }
    });

    loadSection("master");
  </script>
</body>
</html>
